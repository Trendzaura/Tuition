<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuition App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #564100; margin: 0; padding: 12px; }
  h2, h3 { text-align: center; margin: 0 0 16px; padding: 0; color: #a02525; }
  h3 { margin: 0; font-size: 0.95rem; }
  .box { max-width: 1000px; margin: 0 auto 20px; background: #ffd552; padding: 16px; border-radius: 10px; }

  #loginBox { max-width: 420px; padding: 24px 20px; }
  #loginBox input, #loginBox button { display: block; width: 100%; margin: 10px 0 0; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; }
  #loginBox button { background: #2563eb; color: #fff; border: none; cursor: pointer; }
  #loginBox button:hover { opacity: 0.9; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 14px; }
  .toolbar input { flex: 1 1 160px; min-width: 0; padding: 10px 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.95rem; }
  .toolbar button { flex: 0 0 auto; padding: 10px 14px; border-radius: 6px; border: none; background: #2563eb; color: #fff; cursor: pointer; font-size: 0.88rem; white-space: nowrap; }
  .toolbar button:hover { opacity: 0.88; }

  .cards-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .card { flex: 1 1 140px; max-width: 220px; border-radius: 8px; padding: 14px 10px; text-align: center; }
  .card.clickable { cursor: pointer; border: 2px solid transparent; }
  .card.clickable:hover { border-color: #2563eb; }
  .card h3 { font-size: 0.8rem; margin-bottom: 6px; }
  .card .big { margin: 0; font-size: 1.3rem; font-weight: bold; }
  .card .sub { margin: 4px 0 0; font-size: 0.75rem; font-weight: 600; opacity: 0.75; }

  .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; min-width: 580px; border-collapse: collapse; background: #fff; font-size: 0.85rem; }
  th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: center; white-space: nowrap; }
  th { background: #f1f5f9; }
  #studentTable, #studentHistoryTable { min-width: unset; font-size: 0.9rem; }
  #studentTable th { text-align: left; }

  .actions { display: flex; gap: 4px; justify-content: center; }
  .innerbutton { padding: 5px 10px; border-radius: 5px; border: none; background: #2563eb; color: #fff; cursor: pointer; font-size: 0.78rem; white-space: nowrap; }
  .innerbutton:hover { opacity: 0.85; }

  .edit-btn { background: none; border: none; cursor: pointer; font-size: 0.95rem; padding: 0 0 0 3px; vertical-align: middle; opacity: 0.55; }
  .edit-btn:hover { opacity: 1; }

  .paid     { color: green;  font-weight: bold; }
  .unpaid   { color: red;    font-weight: bold; }
  .overpaid { color: orange; font-weight: bold; }
  .hidden   { display: none; }

  @media (max-width: 500px) {
    .card { flex: 1 1 110px; }
    .card h3 { font-size: 0.72rem; }
    .card .big { font-size: 1rem; }
    .card .sub { font-size: 0.68rem; }
    table { font-size: 0.78rem; }
    th, td { padding: 6px 8px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>Tuition Login</h2>
  <input id="password" type="password" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<!-- TEACHER DASHBOARD -->
<div class="box hidden" id="teacherBox">
  <h2>Teacher Dashboard</h2>

  <div class="toolbar">
    <input id="searchStudent" placeholder="Search student by name…" oninput="renderTeacher()">
    <button onclick="addStudent()">+ Add Student</button>
    <button onclick="publishAll()">Publish All</button>
    <button onclick="exportData()">Export</button>
    <button onclick="document.getElementById('importInput').click()">Import</button>
    <input type="file" id="importInput" accept=".json" style="display:none;" onchange="importData(event)">
  </div>

  <!-- 4 SMART CARDS -->
  <div class="cards-row">
    <div class="card clickable" style="background:#e2e8f0;" onclick="setFilter('all')">
      <h3>All Students</h3>
      <p class="big" id="totalStudents">0</p>
      <p class="sub" id="totalFees">₹0 to be paid</p>
    </div>
    <div class="card clickable" style="background:#bbf7d0;" onclick="setFilter('paid')">
      <h3>Paid Students</h3>
      <p class="big" id="paidStudents">0</p>
      <p class="sub" id="totalPaidAmt" style="color:#166534;">₹0 collected</p>
    </div>
    <div class="card clickable" style="background:#fecaca;" onclick="setFilter('unpaid')">
      <h3>Unpaid Students</h3>
      <p class="big" id="unpaidStudents">0</p>
      <p class="sub" id="totalPendingAmt" style="color:#991b1b;">₹0 pending</p>
    </div>
    <div class="card clickable" style="background:#fed7aa;" onclick="setFilter('overpaid')">
      <h3>Overpaid Students</h3>
      <p class="big" id="overpaidStudents">0</p>
      <p class="sub" id="totalOverpaidAmt" style="color:#92400e;">₹0 overpaid</p>
    </div>
  </div>

  <div class="table-wrap">
    <table id="teacherTable"></table>
  </div>
</div>

<!-- STUDENT DASHBOARD -->
<div class="box hidden" id="studentBox">
  <h2>Student Dashboard</h2>
  <div class="table-wrap"><table id="studentTable"></table></div>
  <h3 style="margin:16px 0 8px;">Payment History</h3>
  <div class="table-wrap"><table id="studentHistoryTable"></table></div>
</div>

<script>

const TEACHER_PASSWORD = "1234";
const ENCODE_KEY = 7;
const ENCODE_MULTIPLIER = 4;

function encodeJSON(str) {
  return Array.from(str).map(function(c) {
    return (c.charCodeAt(0) + ENCODE_KEY) * ENCODE_MULTIPLIER;
  });
}
function decodeJSON(arr) {
  return arr.map(function(n) {
    return String.fromCharCode((n / ENCODE_MULTIPLIER) - ENCODE_KEY);
  }).join("");
}

var teacherData = JSON.parse(localStorage.getItem("teacherData")) || { students: [] };
var loggedStudent = null;
var currentFilter = "all";

function login() {
  var pwd = document.getElementById("password").value;
  if (pwd === TEACHER_PASSWORD) {
    hide("loginBox"); show("teacherBox");
    updateFeeCycles(); renderTeacher();
    return;
  }
  fetch("students.json?v=" + Date.now())
    .then(function(r) { if (!r.ok) throw "no-data"; return r.json(); })
    .then(function(arr) {
      var students = JSON.parse(decodeJSON(arr));
      var s = null;
      for (var i = 0; i < students.length; i++) {
        if (students[i].password === pwd) { s = students[i]; break; }
      }
      if (!s) { alert("Invalid password"); return; }
      loggedStudent = s.name;
      hide("loginBox"); show("studentBox");
      updateFeeCycles(); renderStudent();
    })
    .catch(function() { alert("Student data not available. Ask teacher to publish."); });
}

function addStudent() {
  var name = prompt("Enter student name:"); if (!name) return;
  var password = prompt("Enter student password:"); if (!password) return;
  var duplicate = null;
  for (var k = 0; k < teacherData.students.length; k++) {
    if (teacherData.students[k].password === password) { duplicate = teacherData.students[k]; break; }
  }
  if (duplicate) { alert('Password "' + password + '" is already used by "' + duplicate.name + '". Please choose a unique password.'); return; }
  var joiningdate = prompt("Enter joining date (YYYY-MM-DD):"); if (!joiningdate) return;
  var monthlyfees = Number(prompt("Enter monthly fees:")); if (isNaN(monthlyfees)) return;
  teacherData.students.push({ name: name, password: password, joiningdate: joiningdate, monthlyfees: monthlyfees, feestobepaid: 0, feespaid: 0, feesremaining: 0, lastFeeCycle: -1, history: [] });
  updateFeeCycles(); save(); renderTeacher();
}

function renderTeacher() {
  var search = document.getElementById("searchStudent") ? document.getElementById("searchStudent").value.toLowerCase() : "";
  var totalStudents = 0, totalPaid = 0, totalPending = 0, totalOverpaid = 0;
  var paidStudents = 0, unpaidStudents = 0, overpaidStudents = 0;
  var totalFees = 0;

  var html = '<tr><th>Name</th><th>Password</th><th>Joining Date</th><th>Monthly Fees</th><th>To Be Paid</th><th>Paid</th><th>Remaining</th><th>Status</th><th>Actions</th></tr>';

  for (var i = 0; i < teacherData.students.length; i++) {
    var s = teacherData.students[i];
    if (s.name.toLowerCase().indexOf(search) === -1) continue;

    var remaining = s.feestobepaid - s.feespaid;
    var status = remaining > 0 ? "unpaid" : remaining < 0 ? "overpaid" : "paid";
    var headCount = s.name.split("_").length;

    totalStudents += headCount;
    totalFees += s.feestobepaid;
    totalPaid += s.feespaid;

    if (remaining > 0) { totalPending += remaining; unpaidStudents += headCount; }
    else if (remaining < 0) { totalOverpaid += Math.abs(remaining); overpaidStudents += headCount; }
    else { paidStudents += headCount; }

    if (currentFilter !== "all" && currentFilter !== status) continue;

    var statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
    html += '<tr>';
    html += '<td>' + s.name + '</td>';
    html += '<td>' + s.password + '</td>';
    html += '<td>' + s.joiningdate + '</td>';
    html += '<td>₹' + s.monthlyfees + ' <button class="edit-btn" onclick="editmonthlyfees(' + i + ')" title="Edit">✏️</button></td>';
    html += '<td>₹' + s.feestobepaid + ' <button class="edit-btn" onclick="editfeestobepaid(' + i + ')" title="Edit">✏️</button></td>';
    html += '<td>₹' + s.feespaid + ' <button class="edit-btn" onclick="editFees(' + i + ')" title="Edit">✏️</button></td>';
    html += '<td>₹' + remaining + '</td>';
    html += '<td class="' + status + '">' + statusLabel + '</td>';
    html += '<td><div class="actions"><button class="innerbutton" onclick="viewHistory(' + i + ')">History</button><button class="innerbutton" onclick="delStudent(' + i + ')">Delete</button></div></td>';
    html += '</tr>';
  }

  document.getElementById("teacherTable").innerHTML = html;
  document.getElementById("totalStudents").innerText   = totalStudents;
  document.getElementById("totalFees").innerText       = "₹" + totalFees + " to be paid";
  document.getElementById("paidStudents").innerText    = paidStudents;
  document.getElementById("totalPaidAmt").innerText    = "₹" + totalPaid + " collected";
  document.getElementById("unpaidStudents").innerText  = unpaidStudents;
  document.getElementById("totalPendingAmt").innerText = "₹" + totalPending + " pending";
  document.getElementById("overpaidStudents").innerText  = overpaidStudents;
  document.getElementById("totalOverpaidAmt").innerText  = "₹" + totalOverpaid + " overpaid";
}

function editmonthlyfees(i) {
  var s = teacherData.students[i]; if (!s) return;
  if (!s.history) s.history = [];
  var add = prompt("New monthly fees for " + s.name + " (prev: ₹" + s.monthlyfees + ")");
  if (add === null || isNaN(add)) return;
  s.feestobepaid = s.feestobepaid - s.monthlyfees + Number(add);
  s.monthlyfees = Number(add);
  var date = prompt("Date (YYYY-MM-DD):", new Date().toISOString().split("T")[0]);
  if (!date) return;
  s.history.push({ date: date, type: "fee_due", amount: add });
  save(); renderTeacher();
}

function editfeestobepaid(i) {
  var s = teacherData.students[i]; if (!s) return;
  if (!s.history) s.history = [];
  var add = prompt("Fees to be paid by " + s.name + " (monthly: ₹" + s.monthlyfees + ")");
  if (add === null) return;
  add = Number(add);
  if (isNaN(add)) { alert("Enter valid amount"); return; }
  for (var j = s.history.length - 1; j >= 0; j--) {
    if (s.history[j].type === "fee_due") { s.history.splice(j, 1); break; }
  }
  s.feestobepaid = add;
  var date = prompt("Date (YYYY-MM-DD):", new Date().toISOString().split("T")[0]);
  if (!date) return;
  s.history.push({ date: date, type: "fee_due", amount: add });
  save(); renderTeacher();
}

function editFees(i) {
  var s = teacherData.students[i]; if (!s) return;
  if (!s.history) s.history = [];
  var remaining = s.feestobepaid - s.feespaid;
  var add = prompt("Amount paid by " + s.name + " (remaining: ₹" + remaining + ")");
  if (add === null) return;
  add = Number(add);
  if (isNaN(add)) { alert("Enter valid amount"); return; }
  s.feespaid += add;
  s.feesremaining = s.feestobepaid - s.feespaid;
  var date = prompt("Payment date (YYYY-MM-DD):", new Date().toISOString().split("T")[0]);
  if (!date) return;
  s.history.push({ date: date, type: "payment", amount: add });
  save(); renderTeacher();
}

function viewHistory(i) {
  var s = teacherData.students[i];
  if (!s) { alert("Student not found"); return; }
  if (!s.history || s.history.length === 0) { alert("No history available."); return; }
  var h = "History for " + s.name + ":\n\n";
  for (var j = 0; j < s.history.length; j++) {
    var p = s.history[j];
    if (p.type === "fee_due")  h += (j+1) + ". " + p.date + " - ₹" + p.amount + " - Fees due\n";
    if (p.type === "payment")  h += (j+1) + ". " + p.date + " - ₹" + p.amount + " - Payment\n";
  }
  alert(h);
}

function delStudent(i) {
  var s = teacherData.students[i]; if (!s) return;
  if (!confirm("Delete student " + s.name + "?")) return;
  teacherData.students.splice(i, 1);
  save(); renderTeacher();
}

function publishAll() {
  updateFeeCycles();
  var encoded = encodeJSON(JSON.stringify(teacherData.students));
  var blob = new Blob([JSON.stringify(encoded)], { type: "application/json" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "students.json";
  a.click();
  alert("students.json downloaded — upload or share it.");
}

function exportData() {
  var blob = new Blob([JSON.stringify(teacherData, null, 2)], { type: "application/json" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tuition-backup-" + new Date().toISOString().split("T")[0] + ".json";
  a.click();
  alert("Backup exported successfully!");
}

function importData(event) {
  var file = event.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (!imported.students || !Array.isArray(imported.students)) { alert("Invalid file."); return; }
      if (!confirm("Replace all current data with " + imported.students.length + " student(s) from backup?")) return;
      teacherData = imported;
      save(); updateFeeCycles(); renderTeacher();
      alert("Data imported successfully!");
    } catch(err) { alert("Failed to read file."); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function renderStudent() {
  fetch("students.json")
    .then(function(r) { return r.json(); })
    .then(function(arr) {
      var students = JSON.parse(decodeJSON(arr));
      var s = null;
      for (var i = 0; i < students.length; i++) {
        if (students[i].name === loggedStudent) { s = students[i]; break; }
      }
      if (!s) throw 0;
      if (!s.history) s.history = [];
      var remaining = s.feestobepaid - s.feespaid;
      var sc = remaining === 0 ? "paid" : remaining > 0 ? "unpaid" : "overpaid";
      var st = remaining === 0 ? "Paid" : remaining > 0 ? "Unpaid" : "Overpaid";
      document.getElementById("studentTable").innerHTML =
        '<tr><th>Name</th><td>' + s.name + '</td></tr>' +
        '<tr><th>Joining Date</th><td>' + s.joiningdate + '</td></tr>' +
        '<tr><th>Monthly Fees</th><td>₹' + s.monthlyfees + '</td></tr>' +
        '<tr><th>Fees to be Paid</th><td>₹' + s.feestobepaid + '</td></tr>' +
        '<tr><th>Fees Paid</th><td>₹' + s.feespaid + '</td></tr>' +
        '<tr><th>Fees Remaining</th><td>₹' + remaining + '</td></tr>' +
        '<tr><th>Status</th><td class="' + sc + '">' + st + '</td></tr>';
      var historyHTML = '<tr><th>#</th><th>Date</th><th>Fees Due</th><th>Payment</th></tr>';
      if (s.history.length === 0) {
        historyHTML += '<tr><td colspan="4">No payments yet</td></tr>';
      } else {
        for (var j = 0; j < s.history.length; j++) {
          var p = s.history[j];
          historyHTML += '<tr><td>' + (j+1) + '</td><td>' + p.date + '</td>';
          historyHTML += '<td>' + (p.type === "fee_due" ? "₹" + p.amount : "") + '</td>';
          historyHTML += '<td>' + (p.type === "payment" ? "₹" + p.amount : "") + '</td></tr>';
        }
      }
      document.getElementById("studentHistoryTable").innerHTML = historyHTML;
    })
    .catch(function() { document.getElementById("studentTable").innerHTML = "<tr><td>No data published yet</td></tr>"; });
}

function updateFeeCycles() {
  var today = new Date();
  for (var idx = 0; idx < teacherData.students.length; idx++) {
    var s = teacherData.students[idx];
    if (!s.history) s.history = [];
    if (s.lastFeeCycle === undefined || s.lastFeeCycle === null) s.lastFeeCycle = -1;
    if (!s.feestobepaid) s.feestobepaid = 0;
    if (!s.feespaid) s.feespaid = 0;
    var joining = new Date(s.joiningdate);
    var monthsPassed = (today.getFullYear() - joining.getFullYear()) * 12 + (today.getMonth() - joining.getMonth());
    if (today.getDate() < joining.getDate()) monthsPassed--;
    if (monthsPassed < 0) continue;
    if (monthsPassed > s.lastFeeCycle) {
      for (var m = s.lastFeeCycle + 1; m <= monthsPassed; m++) {
        var cycleDate = new Date(joining);
        cycleDate.setMonth(joining.getMonth() + m);
        var overdue = s.feestobepaid - s.feespaid;
        s.feespaid = 0;
        s.feestobepaid = overdue + s.monthlyfees;
        s.feesremaining = s.feestobepaid;
        s.history.push({ date: cycleDate.toISOString().split("T")[0], type: "fee_due", amount: s.feestobepaid });
      }
      s.lastFeeCycle = monthsPassed;
    }
  }
}

function save()       { localStorage.setItem("teacherData", JSON.stringify(teacherData)); }
function hide(id)     { document.getElementById(id).classList.add("hidden"); }
function show(id)     { document.getElementById(id).classList.remove("hidden"); }
function setFilter(f) { currentFilter = f; renderTeacher(); }

</script>
</body>
</html>
