<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tuition App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #564100; margin: 0; padding: 12px; }
  h2, h3 { text-align: center; margin: 0 0 16px; padding: 0; color: #a02525; }
  h3 { margin: 0; font-size: 0.95rem; }
  .box { max-width: 1000px; margin: 0 auto 20px; background: #ffd552; padding: 16px; border-radius: 10px; }

  /* LOGIN */
  #loginBox { max-width: 420px; padding: 24px 20px; }
  #loginBox input, #loginBox button { display: block; width: 100%; margin: 10px 0 0; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; }
  #loginBox button { background: #2563eb; color: #fff; border: none; cursor: pointer; }
  #loginBox button:hover { opacity: 0.9; }

  /* TOOLBAR */
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 14px; }
  .toolbar input { flex: 1 1 160px; min-width: 0; padding: 10px 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.95rem; }
  .toolbar button { flex: 0 0 auto; padding: 10px 14px; border-radius: 6px; border: none; background: #2563eb; color: #fff; cursor: pointer; font-size: 0.88rem; white-space: nowrap; }
  .toolbar button:hover { opacity: 0.88; }

  /* CARDS */
  .cards-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 12px; }
  .card { flex: 1 1 130px; max-width: 200px; border-radius: 8px; padding: 12px 10px; text-align: center; }
  .card.clickable { cursor: pointer; border: 2px solid transparent; }
  .card.clickable:hover { border-color: #2563eb; }
  .card h3 { font-size: 0.8rem; margin-bottom: 6px; }
  .card p { margin: 0; font-size: 1.2rem; font-weight: bold; }

  /* TABLE */
  .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; min-width: 580px; border-collapse: collapse; background: #fff; font-size: 0.85rem; }
  th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: center; white-space: nowrap; }
  th { background: #f1f5f9; }
  #studentTable, #studentHistoryTable { min-width: unset; font-size: 0.9rem; }
  #studentTable th { text-align: left; }

  /* ACTION BUTTONS */
  .actions { display: flex; gap: 4px; justify-content: center; }
  .innerbutton { padding: 5px 10px; border-radius: 5px; border: none; background: #2563eb; color: #fff; cursor: pointer; font-size: 0.78rem; white-space: nowrap; }
  .innerbutton:hover { opacity: 0.85; }

  /* EDIT EMOJI */
  .edit-btn { background: none; border: none; cursor: pointer; font-size: 0.95rem; padding: 0 0 0 3px; vertical-align: middle; opacity: 0.55; }
  .edit-btn:hover { opacity: 1; }

  /* STATUS */
  .paid     { color: green;  font-weight: bold; }
  .unpaid   { color: red;    font-weight: bold; }
  .overpaid { color: orange; font-weight: bold; }
  .hidden   { display: none; }

  @media (max-width: 500px) {
    .card { flex: 1 1 110px; }
    .card h3 { font-size: 0.72rem; }
    .card p  { font-size: 1rem; }
    table { font-size: 0.78rem; }
    th, td { padding: 6px 8px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>Tuition Login</h2>
  <input id="password" type="password" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<!-- TEACHER DASHBOARD -->
<div class="box hidden" id="teacherBox">
  <h2>Teacher Dashboard</h2>

  <div class="toolbar">
    <input id="searchStudent" placeholder="Search student by name…" oninput="renderTeacher()">
    <button onclick="addStudent()">+ Add Student</button>
    <button onclick="publishAll()">Publish All</button>
    <button onclick="exportData()" style="background:#16a34a;">⬇ Export Data</button>
    <button onclick="document.getElementById('importInput').click()" style="background:#7c3aed;">⬆ Import Data</button>
    <input type="file" id="importInput" accept=".json" style="display:none;" onchange="importData(event)">
  </div>

  <div class="cards-row">
    <div class="card" style="background:#dcfce7;"><h3>Total Paid</h3><p id="totalPaid">₹0</p></div>
    <div class="card" style="background:#fee2e2;"><h3>Total Pending</h3><p id="totalPending">₹0</p></div>
    <div class="card" style="background:#ffedd5;"><h3>Total Overpaid</h3><p id="totalOverpaid">₹0</p></div>
  </div>

  <div class="cards-row" style="margin-bottom:16px;">
    <div class="card clickable" style="background:#e2e8f0;" onclick="setFilter('all')"><h3>All Students</h3><p id="totalStudents">0</p></div>
    <div class="card clickable" style="background:#bbf7d0;" onclick="setFilter('paid')"><h3>Paid</h3><p id="paidStudents">0</p></div>
    <div class="card clickable" style="background:#fecaca;" onclick="setFilter('unpaid')"><h3>Unpaid</h3><p id="unpaidStudents">0</p></div>
    <div class="card clickable" style="background:#fed7aa;" onclick="setFilter('overpaid')"><h3>Overpaid</h3><p id="overpaidStudents">0</p></div>
  </div>

  <div class="table-wrap">
    <table id="teacherTable"></table>
  </div>
</div>

<!-- STUDENT DASHBOARD -->
<div class="box hidden" id="studentBox">
  <h2>Student Dashboard</h2>
  <div class="table-wrap"><table id="studentTable"></table></div>
  <h3 style="margin:16px 0 8px;">Payment History</h3>
  <div class="table-wrap"><table id="studentHistoryTable"></table></div>
</div>

<script>
const TEACHER_PASSWORD = "1234";
const ENCODE_KEY = 7;
const ENCODE_MULTIPLIER = 4;

function encodeJSON(str) {
  return Array.from(str).map(c => (c.charCodeAt(0) + ENCODE_KEY) * ENCODE_MULTIPLIER);
}
function decodeJSON(arr) {
  return arr.map(n => String.fromCharCode((n / ENCODE_MULTIPLIER) - ENCODE_KEY)).join("");
}

let teacherData = JSON.parse(localStorage.getItem("teacherData")) || { students: [] };
let loggedStudent = null;
let currentFilter = "all";

/* ── LOGIN ── */
function login() {
  const pwd = document.getElementById("password").value;
  if (pwd === TEACHER_PASSWORD) {
    hide("loginBox"); show("teacherBox");
    updateFeeCycles(); renderTeacher();
    return;
  }
  fetch("students.json?v=" + Date.now())
    .then(r => { if (!r.ok) throw "no-data"; return r.json(); })
    .then(arr => {
      const students = JSON.parse(decodeJSON(arr));
      const s = students.find(x => x.password === pwd);
      if (!s) { alert("Invalid password"); return; }
      loggedStudent = s.name;
      hide("loginBox"); show("studentBox");
      updateFeeCycles(); renderStudent();
    })
    .catch(() => alert("Student data not available. Ask teacher to publish."));
}

/* ── ADD STUDENT ── */
function addStudent() {
  const name = prompt("Enter student name:"); if (!name) return;
  const password = prompt("Enter student password:"); if (!password) return;
  const joiningdate = prompt("Enter joining date (YYYY-MM-DD):"); if (!joiningdate) return;
  const monthlyfees = Number(prompt("Enter monthly fees:")); if (isNaN(monthlyfees)) return;
  teacherData.students.push({ name, password, joiningdate, monthlyfees, feestobepaid: 0, feespaid: 0, feesremaining: 0, lastFeeCycle: -1, history: [] });
  updateFeeCycles(); save(); renderTeacher();
}

/* ── RENDER TEACHER TABLE ── */
function renderTeacher() {
  const search = document.getElementById("searchStudent")?.value.toLowerCase() || "";
  let totalStudents=0, totalPaid=0, totalPending=0, totalOverpaid=0, paidStudents=0, unpaidStudents=0, overpaidStudents=0;

  let html = `<tr><th>Name</th><th>Password</th><th>Joining Date</th><th>Monthly Fees</th><th>To Be Paid</th><th>Paid</th><th>Remaining</th><th>Status</th><th>Actions</th></tr>`;

  teacherData.students.forEach((s, i) => {
    if (!s.name.toLowerCase().includes(search)) return;
    const remaining = s.feestobepaid - s.feespaid;
    const status = remaining > 0 ? "unpaid" : remaining < 0 ? "overpaid" : "paid";

    totalStudents++;
    totalPaid += s.feespaid;
    if (remaining > 0)      { totalPending  += remaining;           unpaidStudents++;   }
    else if (remaining < 0) { totalOverpaid += Math.abs(remaining); overpaidStudents++; }
    else                    { paidStudents++; }

    if (currentFilter !== "all" && currentFilter !== status) return;

    html += `<tr>
      <td>${s.name}</td>
      <td>${s.password}</td>
      <td>${s.joiningdate}</td>
      <td>₹${s.monthlyfees} <button class="edit-btn" onclick="editmonthlyfees(${i})" title="Edit">✏️</button></td>
      <td>₹${s.feestobepaid} <button class="edit-btn" onclick="editfeestobepaid(${i})" title="Edit">✏️</button></td>
      <td>₹${s.feespaid} <button class="edit-btn" onclick="editFees(${i})" title="Edit">✏️</button></td>
      <td>₹${remaining}</td>
      <td class="${status}">${status.charAt(0).toUpperCase()+status.slice(1)}</td>
      <td>
        <div class="actions">
          <button class="innerbutton" onclick="viewHistory(${i})">History</button>
          <button class="innerbutton" onclick="delStudent(${i})">Delete</button>
        </div>
      </td>
    </tr>`;
  });

  document.getElementById("teacherTable").innerHTML = html;
  document.getElementById("totalStudents").innerText    = totalStudents;
  document.getElementById("totalPaid").innerText        = "₹" + totalPaid;
  document.getElementById("totalPending").innerText     = "₹" + totalPending;
  document.getElementById("totalOverpaid").innerText    = "₹" + totalOverpaid;
  document.getElementById("paidStudents").innerText     = paidStudents;
  document.getElementById("unpaidStudents").innerText   = unpaidStudents;
  document.getElementById("overpaidStudents").innerText = overpaidStudents;
}

/* ── EDIT FUNCTIONS ── */
function editmonthlyfees(i) {
  const s = teacherData.students[i]; if (!s) return;
  s.history ??= [];
  let add = prompt(`New monthly fees for ${s.name} (prev: ₹${s.monthlyfees})`);
  if (add === null || isNaN(add)) return;
  s.feestobepaid = s.feestobepaid - s.monthlyfees + Number(add);
  s.monthlyfees = Number(add);
  let date = prompt("Date (YYYY-MM-DD):", new Date().toISOString().split("T")[0]);
  if (!date) return;
  s.history.push({ date, type: "fee_due", amount: add });
  save(); renderTeacher();
}

function editfeestobepaid(i) {
  const s = teacherData.students[i]; if (!s) return;
  s.history ??= [];
  let add = prompt(`Fees to be paid by ${s.name} (monthly: ₹${s.monthlyfees})`);
  if (add === null) return;
  add = Number(add);
  if (isNaN(add)) { alert("Enter valid amount"); return; }
  for (let j = s.history.length - 1; j >= 0; j--) {
    if (s.history[j].type === "fee_due") { s.history.splice(j, 1); break; }
  }
  s.feestobepaid = add;
  let date = prompt("Date (YYYY-MM-DD):", new Date().toISOString().split("T")[0]);
  if (!date) return;
  s.history.push({ date, type: "fee_due", amount: add });
  save(); renderTeacher();
}

function editFees(i) {
  const s = teacherData.students[i]; if (!s) return;
  s.history ??= [];
  const remaining = s.feestobepaid - s.feespaid;
  let add = prompt(`Amount paid by ${s.name} (remaining: ₹${remaining})`);
  if (add === null) return;
  add = Number(add);
  if (isNaN(add)) { alert("Enter valid amount"); return; }
  s.feespaid += add;
  s.feesremaining = s.feestobepaid - s.feespaid;
  let date = prompt("Payment date (YYYY-MM-DD):", new Date().toISOString().split("T")[0]);
  if (!date) return;
  s.history.push({ date, type: "payment", amount: add });
  save(); renderTeacher();
}

function viewHistory(i) {
  const s = teacherData.students[i];
  if (!s) { alert("Student not found"); return; }
  if (!s.history || s.history.length === 0) { alert("No history available."); return; }
  let h = `History for ${s.name}:\n\n`;
  s.history.forEach((p, j) => {
    if (p.type === "fee_due")      h += `${j+1}. ${p.date} - ₹${p.amount} - Fees due\n`;
    else if (p.type === "payment") h += `${j+1}. ${p.date} - ₹${p.amount} - Payment\n`;
  });
  alert(h);
}

function delStudent(i) {
  const s = teacherData.students[i]; if (!s) return;
  if (!confirm(`Delete student ${s.name}?`)) return;
  teacherData.students.splice(i, 1);
  save(); renderTeacher();
}

/* ── PUBLISH ── */
function publishAll() {
  updateFeeCycles();
  const encoded = encodeJSON(JSON.stringify(teacherData.students));
  const blob = new Blob([JSON.stringify(encoded)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "students.json";
  a.click();
  alert("students.json downloaded — upload or share it.");
}

/* ── EXPORT DATA (full backup) ── */
function exportData() {
  const blob = new Blob([JSON.stringify(teacherData, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tuition-backup-" + new Date().toISOString().split("T")[0] + ".json";
  a.click();
  alert("Backup exported successfully!");
}

/* ── IMPORT DATA ── */
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.students || !Array.isArray(imported.students)) {
        alert("Invalid file. Please use a valid tuition backup.");
        return;
      }
      if (!confirm(`Replace all current data with ${imported.students.length} student(s) from backup? This cannot be undone.`)) return;
      teacherData = imported;
      save();
      updateFeeCycles();
      renderTeacher();
      alert("Data imported successfully!");
    } catch {
      alert("Failed to read file. Make sure it's a valid JSON backup.");
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

/* ── STUDENT DASHBOARD ── */
function renderStudent() {
  fetch("students.json")
    .then(r => r.json())
    .then(arr => {
      const students = JSON.parse(decodeJSON(arr));
      const s = students.find(x => x.name === loggedStudent);
      if (!s) throw 0;
      s.history ??= [];
      const remaining = s.feestobepaid - s.feespaid;
      const statusClass = remaining === 0 ? "paid" : remaining > 0 ? "unpaid" : "overpaid";
      const statusText  = remaining === 0 ? "Paid" : remaining > 0 ? "Unpaid" : "Overpaid";

      document.getElementById("studentTable").innerHTML = `
        <tr><th>Name</th><td>${s.name}</td></tr>
        <tr><th>Joining Date</th><td>${s.joiningdate}</td></tr>
        <tr><th>Monthly Fees</th><td>₹${s.monthlyfees}</td></tr>
        <tr><th>Fees to be Paid</th><td>₹${s.feestobepaid}</td></tr>
        <tr><th>Fees Paid</th><td>₹${s.feespaid}</td></tr>
        <tr><th>Fees Remaining</th><td>₹${remaining}</td></tr>
        <tr><th>Status</th><td class="${statusClass}">${statusText}</td></tr>`;

      let historyHTML = `<tr><th>#</th><th>Date</th><th>Fees Due</th><th>Payment</th></tr>`;
      if (s.history.length === 0) {
        historyHTML += `<tr><td colspan="4">No payments yet</td></tr>`;
      } else {
        s.history.forEach((p, j) => {
          historyHTML += `<tr>
            <td>${j+1}</td><td>${p.date}</td>
            <td>${p.type === "fee_due" ? "₹" + p.amount : ""}</td>
            <td>${p.type === "payment" ? "₹" + p.amount : ""}</td>
          </tr>`;
        });
      }
      document.getElementById("studentHistoryTable").innerHTML = historyHTML;
    })
    .catch(() => document.getElementById("studentTable").innerHTML = "<tr><td>No data published yet</td></tr>");
}

/* ── FEE CYCLES ── */
function updateFeeCycles() {
  const today = new Date();
  teacherData.students.forEach(s => {
    s.history ??= [];
    s.lastFeeCycle ??= -1;
    s.feestobepaid ??= 0;
    s.feespaid ??= 0;
    const joining = new Date(s.joiningdate);
    let monthsPassed =
      (today.getFullYear() - joining.getFullYear()) * 12 +
      (today.getMonth() - joining.getMonth());
    if (today.getDate() < joining.getDate()) monthsPassed--;
    if (monthsPassed < 0) return;
    if (monthsPassed > s.lastFeeCycle) {
      for (let m = s.lastFeeCycle + 1; m <= monthsPassed; m++) {
        const cycleDate = new Date(joining);
        cycleDate.setMonth(joining.getMonth() + m);
        const overdue = s.feestobepaid - s.feespaid;
        s.feespaid = 0;
        s.feestobepaid = overdue + s.monthlyfees;
        s.feesremaining = s.feestobepaid;
        s.history.push({ date: cycleDate.toISOString().split("T")[0], type: "fee_due", amount: s.feestobepaid });
      }
      s.lastFeeCycle = monthsPassed;
    }
  });
}

/* ── HELPERS ── */
function save()     { localStorage.setItem("teacherData", JSON.stringify(teacherData)); }
function hide(id)   { document.getElementById(id).classList.add("hidden"); }
function show(id)   { document.getElementById(id).classList.remove("hidden"); }
function setFilter(f){ currentFilter = f; renderTeacher(); }
</script>
</body>
</html>
